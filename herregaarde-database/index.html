<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Herregårdsdatabase</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Herregårdsdatabase</h1>

<div class="filters">

    <label for="herregaard">Herregård</label>
    <select id="herregaard">
        <option value="">Alle herregårde</option>
    </select>

    <label for="aar">Folketællingsår</label>
    <select id="aar">
        <option value="">Alle år</option>
    </select>

    <label for="koen">Køn</label>
    <select id="koen">
        <option value="">Alle</option>
        <option value="M">Mand</option>
        <option value="K">Kvinde</option>
    </select>

    <button id="soeg">
        Søg
    </button>

</div>

<div id="antal"></div>

<div id="output"></div>

    <script src="app.js"></script>

    </body>
</html>
