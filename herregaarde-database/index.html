<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Herregårdsdatabasen</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module" src="js/app.js"></script>

</head>
<body>
<main class="app">
    <header class="search-panel">
        <h1>Herregårdsdatabase</h1>
        <div class="filters">
            <select id="herregaard">
                <option value="">Alle herregårde</option>
            </select>
            <select id="aar">
                <option value="">Alle folketællinger</option>
            </select>
            <label for="arbejde">Arbejde eller position i Husstanden
            <input id="arbejde" type= "text" placeholder="f.eks. Pige">
            </input>
            </label>
            <button id="searchBtn">
                Søg
            </button>
        </div>
    </header>
    <section class="status-panel">
        <div id="resultCount">
            Vælg filtre og tryk "Søg"
        </div>
        <button id="downloadBtn" disabled>
            Download CSV
        </button>
    </section>
    <section class="content">
        <aside id="results">
            <div class="placeholder">
                Ingen søgeresultater endnu
            </div>
        </aside>
        <section id="detail">
            <div class="placeholder">
                Klik på en person for at se alle oplysninger
            </div>
        </section>
    </section>
    <div id="pagination"></div>
    <footer>
    </footer>
</main>
<script type="module" src="js/app.js"></script>
</body>
</html>
