<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Herregårdsdatabasen</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module" src="js/app.js"></script>

</head>
<body>
<main class="app">
    <header class="search-panel">
        <h1>Herregårdsdatabase</h1>
   <div class="filters">
        <div class="filter-group">
            <label for="herregaard">Herregård</label>
            <div id="herregaard">
                <option value="">Alle herregårde</option>
            </div>
        </div>
        <div class="filter-group">
            <label for="aar">Folketællingsår</label>
            <div id="aar">
                <option value="">Alle folketællinger</option>
            </div>
        </div>
<div class="filter-group autosuggest">

    <label for="arbejde">
        Arbejde eller position
    </label>

    <input
        id="arbejde"
        type="text"
        placeholder="f.eks. pige">
    
    <div
        id="arbejdeSuggestions"
        class="autosuggest-list">
    </div>

    <div
        id="arbejdeSelect">
    </div>

</div>
            <button id="searchBtn">
                Søg
            </button>
            <button id="clearBtn">
                Ryd filtre
            </button>
       <div class="advanced-filters">
    <button
    id="toggleAdvanced"
    class="advanced-toggle">
    <span>Udvidede filtre</span>
    <span
        id="advancedArrow"
        class="advanced-arrow">
        ▼
    </span>
    </button>
    <div
        id="advancedContent"
        class="advanced-content">
        <div class="advanced-grid">
    <label for="koen">Køn</label>
    <div id="koen"></div>
    <label for="trossamfund">Religion</label>
    <div id="trossamfund"></div>
    <label for="civilstand">Civilstand</label>
    <div id="civilstand"></div>
    <label for="handicap">Handicap</label>
    <div id="handicap"></div>
    <label for="region">Herregårdens Region</label>
    <div id="region"></div>
    <label for="kommune">Herregårdens Kommune</label>
    <div id="kommune"></div> 
    <label>Alder</label>
    <div class="range-filter">
    <input
        type="number"
        id="alderFra"
        placeholder="Fra">
    <span>–</span>
    <input
        type="number"
        id="alderTil"
        placeholder="Til">
</div>
    <label>Transport (km)</label>
    <div class="range-filter">
    <input
        type="number"
        id="transportFra"
        placeholder="Fra"
        step="0.1">
    <span>–</span>
    <input
        type="number"
        id="transportTil"
        placeholder="Til"
        step="0.1">
</div>
        </div>
    </div>
</div>
        </div>
    </header>
    <section class="status-panel">
        <div id="resultCount">
            Vælg filtre og tryk "Søg"
        </div>
        <button id="downloadBtn" disabled>
            Download CSV
        </button>
    </section>
    <section class="content">
        <aside id="results">
            <div class="placeholder">
                Ingen søgeresultater endnu
            </div>
        </aside>
        <section id="detail">
            <div class="placeholder">
                Klik på en person for at se alle oplysninger
            </div>
        </section>
    </section>
    <div id="pagination"></div>
    <footer>
    </footer>
</main>
<script type="module" src="js/app.js"></script>
</body>
</html>
